<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/inicioDeSesion.css">
</head>

<body>

    <div class="contenedor">

        <div class="login">

            <div class="logo">
                <img src="/img/logo sin fondo.png" alt="Book&Cut">
            </div>

            <h1 class="tituloLogin">Registrarse</h1>

            <form>
                <div class="inputIcono">
                    <input type="text" placeholder="Nombre Completo">
                    <span>👤</span>
                </div>

                <div class="inputIcono">
                    <input type="email" placeholder="Correo Electronico">
                    <span>✉</span>
                </div>

                <div class="inputIcono">
                    <input type="text" placeholder="Teléfono">
                    <span>📞</span>
                </div>

                <div class="inputIcono">
                    <input type="password" placeholder="Contraseña">
                    <span>🔒</span>
                </div>

                <div class="inputIcono">
                    <input type="password" placeholder="Confirmar Contraseña">
                    <span>🔒</span>
                </div>

                <div class="terminos">
                    <a href="#">Terminos y Condiciones</a>

                    <p>
                        Al registrarte, aceptas los Terminos y Condiciones y la Politica de Privacidad de Book&Cut.
                    </p>
                </div>

                <button type="button" class="btn btn-outline-dark activado BotonDefecto btnLogin">Registrarse</button>
            </form>

            <button type="button" class="btn btn-outline-dark activado BotonDefecto volver"
                onclick="window.location.href='/html/incio_Sesion/inicioSesion.html'">atras</button>
        </div>

        <div class="imagen"></div>
    </div>

</body>

</html>
