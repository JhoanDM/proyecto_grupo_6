<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Book&Cut - Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/estiloGLOBAL.css" />
    <link rel="stylesheet" href="../../css/perfil_info_barbero.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div>
            <img class="logo" src="../../img/logo sin fondo.png" alt="logo" />
        </div>
        <nav>
            <div>
                <a href="../../html/barbero/inicio_barbero_cita.html" class="btn btn-outline-dark activado"> Citas </a>
            </div>
            <div id="zona-auth"></div>
        </nav>
    </header>

    <!-- Navigation tabs -->

    <div class="tabs">
        <a href="/html/barbero/perfil_info_barbero.html">
            <button type="button" class="btn btn-outline-dark activado">INF BARBERO</button>
        </a>
        <a href="/html/barbero/historial_vista_barbero.html">
            <button type="button" class="btn btn-outline-dark activado">HISTORIAL</button>
        </a>
    </div>

    <!-- Main content -->
    <main class="container">
        <div class="contenedor-foto">


            <div class="photo-placeholder"></div>

            <button type="button" class="btn btn-outline-secondary boton-cambiar-foto">Cambiar Foto</button>


        </div>



        <form class="form">
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre completo</label>
                    <input type="text">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password">
                </div>
                <div class="form-group">
                    <label>Confirmar contraseña</label>
                    <input type="password">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email">
                </div>
                <div class="form-group">
                    <label>Confirmar correo electrónico</label>
                    <input type="email">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Número celular</label>
                    <input type="tel">
                </div>
                <div class="form-group">
                    <label>Confirmar número celular</label>
                    <input type="tel">
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-outline-primary">Guardar cambios</button>
            </div>
        </form>
    </main>
    <script src="/js/auth.js"></script>

</body>

</html>
