<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Agenda tu cita</title>
   
    <link rel="stylesheet" href="../../css/servicios_cliente.css">
    <link rel="stylesheet" href="/css/estiloGLOBAL.css" />
    
</head>
</head>

 <!-- Header -->
    <header>
        <div>
            <img class="logo" src="/img/logo sin fondo.png" alt="logo" />
        </div>
        <nav>
            <div>
                <a href="/html/pantallaInicio.html#Servicios" class="btn btn-outline-dark activado"> Servicios </a>
                <a href="/html/pantallaInicio.html#Locales" class="btn btn-outline-dark activado"> Locales </a>
            </div>
            <div id="zona-auth"></div>
        </nav>
    </header>



<body>

    <h1>AGENDA TU CITA</h1>

    <div class="servicios">

        <div class="card" onclick="mostrarServicio('corte')">
            <h3>Corte de Cabello</h3>
        </div>

        <div class="card" onclick="mostrarServicio('nino')">
            <h3>Corte para Niño</h3>
        </div>

        <div class="card" onclick="mostrarServicio('tinte')">
            <h3>Tinte de Cabello</h3>
        </div>

        <div class="card" onclick="mostrarServicio('depilacion')">
            <h3>Depilación</h3>
        </div>

        <div class="card" onclick="mostrarServicio('facial')">
            <h3>Tratamiento Facial</h3>
        </div>

        <div class="card" onclick="mostrarServicio('capilar')">
            <h3>Tratamiento Capilar</h3>
        </div>

    </div>

    <!-- CONTENEDOR DINÁMICO -->
    <div class="detalle" id="detalleServicio">

        <h2 id="titulo"></h2>
        <p id="duracion"></p>
        <h3 id="precio"></h3>
        <button>Agendar servicio</button>
        <p id="descripcion"></p>

    </div>

    <script src="../../js/servicios_cliente.js"></script>
</body>

</html>
